info:
  name: Force Data Collection with MongoDB
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/api/productionplans/production-registries/?pr_id={{production_registry_id}}&action=force_data_collection"
  headers:
    - name: Authorization
      value: Bearer {{jwt_token}}
    - name: Content-Type
      value: application/json
  params:
    - name: pr_id
      value: "{{production_registry_id}}"
      type: query
    - name: action
      value: force_data_collection
      type: query
  body:
    type: json
    data: |-
      {
        "save_to_mongodb": true
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Force data collection and save to MongoDB
