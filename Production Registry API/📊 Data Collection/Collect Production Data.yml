info:
  name: Collect Production Data
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/api/productionplans/production-registries/?pr_id={{production_registry_id}}&action=collect_data"
  headers:
    - name: Authorization
      value: Bearer {{jwt_token}}
    - name: Content-Type
      value: application/json
  params:
    - name: pr_id
      value: "{{production_registry_id}}"
      type: query
    - name: action
      value: collect_data
      type: query
  body:
    type: json
    data: "{}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Collect production data for the registry
