info:
  name: Create Single Registry
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/api/productionplans/production-registries/"
  headers:
    - name: Authorization
      value: Bearer {{jwt_token}}
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "inquiry_id": "{{inquiry_id}}",
        "notes": "High priority production for urgent delivery"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Create a new production registry for a single inquiry
