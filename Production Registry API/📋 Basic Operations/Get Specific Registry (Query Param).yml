info:
  name: Get Specific Registry (Query Param)
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/api/productionplans/production-registries/?pr_id={{production_registry_id}}"
  headers:
    - name: Authorization
      value: Bearer {{jwt_token}}
  params:
    - name: pr_id
      value: "{{production_registry_id}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get specific production registry by ID using query parameter
