info:
  name: Filter by Status
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/api/productionplans/production-registries/?status=in_process"
  headers:
    - name: Authorization
      value: Bearer {{jwt_token}}
  params:
    - name: status
      value: in_process
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Filter registries by single status
