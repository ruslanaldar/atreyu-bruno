info:
  name: Production Registry API

request:
  auth:
    type: bearer
    token: "{{jwt_token}}"
  variables:
    - name: base_url
      value: http://27.223.82.66:18080
    - name: jwt_token
      value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ0b2tlbl90eXBlIjoiYWNjZXNzIiwiZXhwIjoxNzU1NjI0NzUzLCJpYXQiOjE3NTU1MzgzNTMsImp0aSI6IjUyNjI4NjYyNmEyZDRkYTY5ZjQ0N2E1NmEzNDU0ZDFjIiwidXNlcl9pZCI6MX0.OR_WhBshpRmI4_FVKet3o4hQWPIgqJBCcxUaug3JwAc
    - name: production_registry_id
      value: 98dd3107-f2df-4d0e-8dec-2a44bc296cd2
    - name: inquiry_id
      value: INQ-20250617-0001
    - name: prefix
      value: /api/orders/inquiries
  scripts:
    - type: before-request
      code: |-
        // Set default values if not exists
        if (!bru.getVar('production_registry_id')) {
            bru.setVar('production_registry_id', '98dd3107-f2df-4d0e-8dec-2a44bc296cd2');
        }

        if (!bru.getVar('inquiry_id')) {
            bru.setVar('inquiry_id', 'I-001-0001');
        }
    - type: after-response
      code: |-
        // Global test validation
        test('Response status should be successful', function () {
            expect(res.getStatus()).to.be.oneOf([200, 201, 204]);
        });

        // Extract and set production registry ID from create responses
        if (res.getStatus() === 201) {
            try {
                var responseJson = res.getBody();
                if (responseJson.id) {
                    bru.setVar('production_registry_id', responseJson.id);
                    console.log('Set production_registry_id to: ' + responseJson.id);
                }
            } catch (e) {
                console.log('Could not parse response JSON');
            }
        }

        // Log errors for debugging
        if (res.getStatus() >= 400) {
            console.log('Error Response:', JSON.stringify(res.getBody()));
        }

docs:
  content: |-
    \# Production Registry API - Complete Handbook

    \## 📖 Table of Contents

    1\. \[Overview\](#overview)  
    2\. \[Authentication\](#authentication)  
    3\. \[Base URL\](#base-url)  
    4\. \[API Endpoints\](#api-endpoints)  
    5\. \[Query Parameters\](#query-parameters)  
    6\. \[Request/Response Formats\](#requestresponse-formats)  
    7\. \[Error Handling\](#error-handling)  
    8\. \[Usage Examples\](#usage-examples)  
    9\. \[Postman Collection\](#postman-collection)  
    10\. \[Best Practices\](#best-practices)

    \## 📋 Overview

    The Production Registry API manages production registries for inquiries, following the same query parameter pattern as the inquiry_views system. This API provides full CRUD operations with soft delete functionality and comprehensive data collection capabilities.

    \### Key Features:  
    \- ✅ Full CRUD operations with query parameter actions  
    \- ✅ Soft delete (cancel production instead of deleting records)  
    \- ✅ Comprehensive filtering and search capabilities  
    \- ✅ Production data collection and analytics  
    \- ✅ Bulk operations support  
    \- ✅ MongoDB integration ready  
    \- ✅ UUID-based identification

    \## 🔐 Authentication

    All endpoints require authentication. Include the authentication token in the request headers:

    \`\`\`http  
    Authorization: Bearer your_jwt_token_here  
    \`\`\`

    \## 🌐 Base URL

    \`\`\`  
    [http://localhost:8000/api/productionplans/production-registries/](http://localhost:8000/api/productionplans/production-registries/)  
    \`\`\`

    \## 📡 API Endpoints

    \### Main Endpoint  
    \- \`GET /api/productionplans/production-registries/\` - List all or get specific registry  
    \- \`POST /api/productionplans/production-registries/\` - Create new registry or perform actions  
    \- \`PUT /api/productionplans/production-registries/\` - Update registry or status  
    \- \`DELETE /api/productionplans/production-registries/\` - Cancel production (soft delete)

    \### Analytics Endpoints  
    \- \`GET /api/productionplans/production-registries/summary/\` - Get summary statistics  
    \- \`GET /api/productionplans/production-registries/analytics/\` - Get detailed analytics

    \## 🔍 Query Parameters

    \### Identification Parameters  
    | Parameter | Type | Description | Example |  
    |-----------|------|-------------|---------|  
    | \`pr_id\` | UUID | Production registry ID (query param) | \`pr_id=98dd3107-f2df-4d0e-8dec-2a44bc296cd2\` |  
    | \`production_registry_id\` | UUID | Alternative ID parameter | \`production_registry_id=98dd3107-...\` |

    \### Filtering Parameters  
    | Parameter | Type | Description | Example |  
    |-----------|------|-------------|---------|  
    | \`status\` | String | Filter by single status | \`status=in_process\` |  
    | \`status_in\` | String | Filter by multiple statuses (comma-separated) | \`status_in=in_process,completed\` |  
    | \`inquiry_type\` | String | Filter by inquiry type | \`inquiry_type=serial\` |  
    | \`company_id\` | Integer | Filter by company ID | \`company_id=1\` |  
    | \`company_name\` | String | Filter by company name (partial match) | \`company_name=ACME\` |  
    | \`customer_id\` | Integer | Filter by customer ID | \`customer_id=1\` |  
    | \`customer_name\` | String | Filter by customer name (partial match) | \`customer_name=ABC Corp\` |  
    | \`date_from\` | Date | Start date filter (YYYY-MM-DD) | \`date_from=2025-01-01\` |  
    | \`date_to\` | Date | End date filter (YYYY-MM-DD) | \`date_to=2025-12-31\` |  
    | \`min_value\` | Float | Minimum inquiry value | \`min_value=10000\` |  
    | \`max_value\` | Float | Maximum inquiry value | \`max_value=100000\` |  
    | \`registered_by\` | Integer | Filter by user ID who registered | \`registered_by=1\` |  
    | \`registered_by_username\` | String | Filter by username (partial match) | \`registered_by_username=john.doe\` |  
    | \`production_number\` | String | Filter by production number (partial match) | \`production_number=PROD-001\` |  
    | \`inquiry_id\` | String | Filter by inquiry ID (partial match) | \`inquiry_id=I-001\` |  
    | \`has_mongo_document\` | Boolean | Filter by MongoDB document existence | \`has_mongo_document=true\` |  
    | \`notes\` | String | Filter by notes content (partial match) | \`notes=urgent\` |

    \### Search and Ordering  
    | Parameter | Type | Description | Example |  
    |-----------|------|-------------|---------|  
    | \`search\` | String | Search across multiple fields | \`search=urgent customer\` |  
    | \`ordering\` | String | Order by field (prefix with - for desc) | \`ordering=-created_at\` |

    \### Pagination  
    | Parameter | Type | Description | Example |  
    |-----------|------|-------------|---------|  
    | \`page\` | Integer | Page number (default: 1) | \`page=2\` |  
    | \`page_size\` | Integer | Items per page (default: 20) | \`page_size=50\` |  
    | \`no_pagination\` | Boolean | Disable pagination | \`no_pagination=true\` |

    \### Action Parameters  
    | Parameter | Type | Description | Used With |  
    |-----------|------|-------------|-----------|  
    | \`action\` | String | Specific action to perform | POST, PUT, DELETE |

    \#### Available Actions:  
    \- **POST Actions:** \`collect_data\`, \`force_data_collection\`  
    \- **PUT Actions:** \`update_status\`, \`update_notes\`, \`update_registry\`  
    \- **DELETE Actions:** \`cancel_production\`

    \## 📝 Request/Response Formats

    \### Status Choices  
    \`\`\`json  
    {  
    "choices": \[  
    {"value": "in_process", "label": "In Process"},  
    {"value": "completed", "label": "Completed"},  
    {"value": "cancelled", "label": "Cancelled"}  
    \]  
    }  
    \`\`\`

    \### Inquiry Type Choices  
    \`\`\`json  
    {  
    "choices": \[  
    {"value": "sample", "label": "Sample"},  
    {"value": "one_time", "label": "One Time"},  
    {"value": "serial", "label": "Serial"}  
    \]  
    }  
    \`\`\`

    \### List Response Format  
    \`\`\`json  
    {  
    "production_registries": \[  
    {  
    "id": "98dd3107-f2df-4d0e-8dec-2a44bc296cd2",  
    "production_number": "PROD-001-20250627",  
    "status": "in_process",  
    "inquiry": {  
    "id": "uuid",  
    "inquiry_id": "I-001-0001",  
    "company_name": "ACME Corp",  
    "inquiry_type": "serial",  
    "status": "in_production",  
    "total_value": "50000.00",  
    "parts_count": 5,  
    "created_at": "2025-06-27T10:00:00Z"  
    },  
    "registered_by_name": "john.doe",  
    "days_in_production": 5,  
    "created_at": "2025-06-27T10:00:00Z",  
    "updated_at": "2025-06-27T15:30:00Z"  
    }  
    \],  
    "total": 150,  
    "page": 1,  
    "page_size": 20,  
    "has_next": true,  
    "has_previous": false,  
    "filters_applied": {  
    "status": "in_process",  
    "company_id": "1",  
    "search": null  
    }  
    }  
    \`\`\`

    \### Detail Response Format  
    \`\`\`json  
    {  
    "id": "98dd3107-f2df-4d0e-8dec-2a44bc296cd2",  
    "production_number": "PROD-001-20250627",  
    "status": "in_process",  
    "inquiry": {  
    "id": "uuid",  
    "inquiry_id": "I-001-0001",  
    "company_details": {  
