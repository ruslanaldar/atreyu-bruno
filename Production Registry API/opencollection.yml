    \`\`\`

    \### Error Response Format  
    \`\`\`json  
    {  
    "error": "Error description",  
    "detail": "Detailed error message",  
    "required_params": "pr_id, action",  
    "provided_id": "invalid-id"  
    }  
    \`\`\`

    \## ⚠️ Error Handling

    \### Common HTTP Status Codes  
    \- \`200 OK\` - Successful operation  
    \- \`201 Created\` - Resource created successfully  
    \- \`400 Bad Request\` - Invalid request parameters  
    \- \`401 Unauthorized\` - Authentication required  
    \- \`404 Not Found\` - Resource not found  
    \- \`500 Internal Server Error\` - Server error

    \### Common Error Scenarios  
    1\. **Missing Required Parameters**  
    2\. **Invalid UUID Format**  
    3\. **Resource Not Found**  
    4\. **Invalid Status Transitions**  
    5\. **Authentication Errors**

    \## 🎯 Usage Examples

    \### 1. List All Production Registries  
    \`\`\`http  
    GET /api/productionplans/production-registries/  
    \`\`\`

    \### 2. Get Specific Registry (Two Methods)  
    \`\`\`http  
    \# Method 1: URL path parameter  
    GET /api/productionplans/production-registries/98dd3107-f2df-4d0e-8dec-2a44bc296cd2/

    \# Method 2: Query parameter  
    GET /api/productionplans/production-registries/?pr_id=98dd3107-f2df-4d0e-8dec-2a44bc296cd2  
    \`\`\`

    \### 3. Filter Registries  
    \`\`\`http  
    \# Single filter  
    GET /api/productionplans/production-registries/?status=in_process

    \# Multiple filters  
    GET /api/productionplans/production-registries/?status=in_process&company_id=1&inquiry_type=serial

    \# Date range filter  
    GET /api/productionplans/production-registries/?date_from=2025-01-01&date_to=2025-12-31

    \# Value range filter  
    GET /api/productionplans/production-registries/?min_value=10000&max_value=100000  
    \`\`\`

    \### 4. Search Registries  
    \`\`\`http  
    \# Simple search  
    GET /api/productionplans/production-registries/?search=PROD-001

    \# Search with pagination  
    GET /api/productionplans/production-registries/?search=urgent&page=2&page_size=50

    \# Complex search  
    GET /api/productionplans/production-registries/?search=urgent&status=in_process&company_name=ACME  
    \`\`\`

    \### 5. Create Single Registry  
    \`\`\`http  
    POST /api/productionplans/production-registries/  
    Content-Type: application/json

    {  
    "inquiry_id": "I-001-0001",  
    "notes": "High priority production for urgent delivery"  
    }  
    \`\`\`

    \### 6. Bulk Create Registries  
    \`\`\`http  
    POST /api/productionplans/production-registries/  
    Content-Type: application/json

    {  
    "inquiry_ids": \[  
    "I-001-0001",  
    "I-001-0002",  
    "I-001-0003"  
    \]  
    }  
    \`\`\`

    \### 7. Update Production Status  
    \`\`\`http  
    PUT /api/productionplans/production-registries/?pr_id=98dd3107-f2df-4d0e-8dec-2a44bc296cd2&action=update_status  
    Content-Type: application/json

    {  
    "status": "completed",  
    "notes": "Production completed successfully on schedule"  
    }  
    \`\`\`

    \### 8. Update Production Notes  
    \`\`\`http  
    PUT /api/productionplans/production-registries/?pr_id=98dd3107-f2df-4d0e-8dec-2a44bc296cd2&action=update_notes  
    Content-Type: application/json

    {  
    "notes": "Updated production notes with new requirements"  
    }  
    \`\`\`

    \### 9. Collect Production Data  
    \`\`\`http  
    POST /api/productionplans/production-registries/?pr_id=98dd3107-f2df-4d0e-8dec-2a44bc296cd2&action=collect_data  
    Content-Type: application/json

    {}  
    \`\`\`

    \### 10. Force Data Collection with MongoDB Save  
    \`\`\`http  
    POST /api/productionplans/production-registries/?pr_id=98dd3107-f2df-4d0e-8dec-2a44bc296cd2&action=force_data_collection  
    Content-Type: application/json

    {  
    "save_to_mongodb": true  
    }  
    \`\`\`

    \### 11. Cancel Production (Soft Delete)  
    \`\`\`http  
    DELETE /api/productionplans/production-registries/?pr_id=98dd3107-f2df-4d0e-8dec-2a44bc296cd2&action=cancel_production  
    \`\`\`

    \### 12. Get Production Summary  
    \`\`\`http  
    GET /api/productionplans/production-registries/summary/  
    \`\`\`

    \### 13. Get Production Analytics  
    \`\`\`http  
    GET /api/productionplans/production-registries/analytics/  
    \`\`\`

    \## 📊 Advanced Filtering Examples

    \### Multiple Status Filter  
    \`\`\`http  
    GET /api/productionplans/production-registries/?status_in=in_process,completed,cancelled  
    \`\`\`

    \### User-based Filtering  
    \`\`\`http  
    GET /api/productionplans/production-registries/?registered_by_username=john.doe&has_mongo_document=true  
    \`\`\`

    \### Complex Multi-criteria Search  
    \`\`\`http  
    GET /api/productionplans/production-registries/?search=urgent&production_number=PROD-001&inquiry_id=I-001&customer_name=ABC Corp&ordering=-created_at  
    \`\`\`

    \### Company and Date Range  
    \`\`\`http  
    GET /api/productionplans/production-registries/?company_name=ACME&date_from=2025-01-01&date_to=2025-06-30&min_value=50000  
    \`\`\`

    \## 🧪 Testing Scenarios

    \### Workflow 1: Complete CRUD Lifecycle  
    1\. Create single production registry  
    2\. Get the registry details  
    3\. Update production status  
    4\. Collect production data  
    5\. Update notes  
    6\. Cancel production

    \### Workflow 2: Bulk Operations  
    1\. Bulk create multiple registries  
    2\. List all with filters  
    3\. Search across registries  
    4\. Get analytics summary

    \### Workflow 3: Data Collection  
    1\. Create test registry  
    2\. Collect initial production data  
    3\. Force data collection with MongoDB save  
    4\. Verify data integrity

    \### Workflow 4: Error Handling  
    1\. Test with invalid UUID  
    2\. Test missing required parameters  
    3\. Test invalid status transitions  
    4\. Test authentication errors

    \## 🎯 Best Practices

    \### 1. Always Use UUIDs  
    \- Production registry IDs are UUID4 format  
    \- Never use sequential integers  
    \- Clean UUID strings (remove quotes)

    \### 2. Parameter Naming  
    \- Use \`pr_id\` for query parameters (shorter)  
    \- Use \`production_registry_id\` for body parameters (descriptive)  
    \- Follow consistent naming patterns

    \### 3. Status Management  
    \- Always validate status transitions  
    \- Use soft delete (cancel) instead of hard delete  
    \- Track status change history

    \### 4. Error Handling  
    \- Always check response status codes  
    \- Handle UUID format validation  
    \- Provide meaningful error messages

    \### 5. Pagination  
    \- Use pagination for large datasets  
    \- Set reasonable page_size limits  
    \- Use \`no_pagination=true\` only when necessary

    \### 6. Filtering Best Practices  
    \- Combine multiple filters for specific results  
    \- Use date ranges for time-based queries  
    \- Use search for text-based queries

    \### 7. Data Collection  
    \- Collect production data after status changes  
    \- Use force collection for data updates  
    \- Save to MongoDB for external processing

    \### 8. Security  
    \- Always include authentication headers  
    \- Validate user permissions  
    \- Log all production changes

    \## 🔄 Common Workflows

    \### Production Planning Workflow  
    \`\`\`  
    1\. Inquiry approved →  
    2\. Create production registry →  
    3\. Collect initial data →  
    4\. Update to in_process →  
    5\. Monitor progress →  
    6\. Update to completed →  
    7\. Final data collection  
    \`\`\`

    \### Error Recovery Workflow  
    \`\`\`  
    1\. Detect error →  
    2\. Cancel production →  
    3\. Fix issues →  
    4\. Create new registry →  
    5\. Resume production  
    \`\`\`

    \### Analytics Workflow  
    \`\`\`  
    1\. Collect all production data →  
    2\. Get summary statistics →  
    3\. Get detailed analytics →  
    4\. Generate reports →  
    5\. Monitor KPIs  
    \`\`\`

    \## 📚 Related Documentation

    \- \[Inquiry API Documentation\](link-to-inquiry-docs)  
    \- \[Parts API Documentation\](link-to-parts-docs)  
    \- \[Authentication Guide\](link-to-auth-docs)  
    \- \[MongoDB Integration Guide\](link-to-mongo-docs)

    \## 🆘 Support

    For technical support or questions:  
    \- Check the error messages and status codes  
    \- Verify authentication and permissions  
    \- Review the query parameter formats  
    \- Test with the provided Postman collection

    \## 📝 Changelog

    \### Version 1.0.0 (2025-06-27)  
    \- Initial release  
    \- Full CRUD operations with query parameters  
    \- UUID-based identification  
    \- Soft delete functionality  
    \- Production data collection  
    \- Comprehensive filtering and search  
    \- Analytics and summary endpoints
