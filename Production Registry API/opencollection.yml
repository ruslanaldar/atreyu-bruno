    "short_name": "ACME",  
    "full_name": "ACME Corporation"  
    },  
    "customer": {  
    "id": 1,  
    "full_name": "John Smith"  
    },  
    "inquiry_parts": \[...\],  
    "delivery_schedules": \[...\],  
    "production_summary": {  
    "parts_count": 5,  
    "total_quantity": 100,  
    "deliveries_count": 3,  
    "total_value": 50000.00  
    }  
    },  
    "registered_by_name": "john.doe",  
    "complete_production_data": {  
    "production_registry_id": "98dd3107-f2df-4d0e-8dec-2a44bc296cd2",  
    "production_number": "PROD-001-20250627",  
    "inquiry_data": {...},  
    "parts_production_data": \[...\],  
    "production_summary": {  
    "total_parts": 5,  
    "total_quantity": 100,  
    "total_production_time_hours": 120.5,  
    "total_material_cost": 25000.00,  
    "equipment_requirements": \["CNC Machine", "Welding Station"\]  
    }  
    },  
    "notes": "High priority production",  
    "created_at": "2025-06-27T10:00:00Z",  
    "updated_at": "2025-06-27T15:30:00Z"  
