info:
  name: Material Standards API

request:
  auth:
    type: bearer
    token: "{{authToken}}"
  variables:
    - name: baseUrl
      value: http://27.223.82.66:18080/api
    - name: authToken
      value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ0b2tlbl90eXBlIjoiYWNjZXNzIiwiZXhwIjoxNzU3MjEzNTk3LCJpYXQiOjE3NTcxMjcxOTcsImp0aSI6ImVkYzRjMjg2ODI2MjQ0OTZiZjc2NTljNDUyMmRjMWM5IiwidXNlcl9pZCI6MX0.2hQYE5wVYJ_99L_sDHbFJsYwj3EYJJtqMgm8sDUkIwg
    - name: csrfToken
      value: your_csrf_token_here
    - name: subPart
      value: "8"
  scripts:
    - type: before-request
      code: |-
        // Auto-generate timestamp for tracking requests
        bru.setGlobalEnvVar('timestamp', Date.now());
    - type: after-response
      code: |-
        // Common tests for all requests
        test('Response time is reasonable', function () {
            expect(res.getResponseTime()).to.be.below(5000);
        });

        test('Content-Type is JSON', function () {
            expect(res.getHeader('Content-Type')).to.include('application/json');
        });

        // Store commonly used values
        if (res.getBody() && res.getBody().id) {
            bru.setGlobalEnvVar('lastCreatedId', res.getBody().id);
        }

docs:
  content: Complete API collection for Material Standards, SubParts, and related operations
  type: text/markdown
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
