info:
  name: List All Material Standards
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/basics/materials/material-standards"
  headers:
    - name: Authorization
      value: Bearer {{authToken}}
  params:
    - name: page
      value: "1"
      type: query
      disabled: true
    - name: page_size
      value: "20"
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get paginated list of material standards
