info:
  name: Filter by Material Subgroup
  type: http
  seq: 5

http:
  method: GET
  url: "{{baseUrl}}/basics/materials/material-standards?material_subgroup=26"
  headers:
    - name: Authorization
      value: Bearer {{authToken}}
  params:
    - name: material_subgroup
      value: "26"
      type: query
      description: Filter by material subgroup ID
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get standards from specific material subgroup
