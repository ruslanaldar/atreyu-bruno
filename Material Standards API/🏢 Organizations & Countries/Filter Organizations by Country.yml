info:
  name: Filter Organizations by Country
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/basics/materials/standard-organizations?country=13"
  headers:
    - name: Authorization
      value: Bearer {{authToken}}
  params:
    - name: country
      value: "13"
      type: query
      description: Filter by country ID
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get organizations from specific country
