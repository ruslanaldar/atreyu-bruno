info:
  name: List root tasks
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}{{prefix}}?page=1&limit=20&sortBy=createdAt&sortOrder=desc&status=pending&status=in_progress&priority=high&search=sprint"
  params:
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "20"
      type: query
    - name: sortBy
      value: createdAt
      type: query
    - name: sortOrder
      value: desc
      type: query
    - name: status
      value: pending
      type: query
    - name: status
      value: in_progress
      type: query
    - name: priority
      value: high
      type: query
    - name: search
      value: sprint
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
