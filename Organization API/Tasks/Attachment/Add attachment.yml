info:
  name: Add attachment
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}{{prefix}}nested/"
  body:
    type: json
    data: |-
      {
        "action": "add_attachment",
        "taskId": 3,
        "name": "agenda.pdf",
        "url": "https://storage.example.com/agenda.pdf",
        "attachment_type": "application/pdf"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
