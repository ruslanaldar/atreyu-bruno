info:
  name: Tasks
  type: folder
  seq: 1

request:
  auth: inherit
  variables:
    - name: prefix
      value: /organization/tasks/

docs:
  content: |+
    Creating tasks for the users.
    Task type choices:
    1. time_range
    2. specific_time

    Category choices:
    1. meeting
    2. task
    3. review
    4. research
    5. personal
    6. workout
    7. stand_up

    priority choices:
    1. low
    2. medium
    3. high
    4. urgent

    status choices:
    1. pending
    2. in_progress
    3. completed
    4. cancelled


  type: text/markdown
