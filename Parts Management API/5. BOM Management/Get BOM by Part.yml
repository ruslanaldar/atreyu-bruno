info:
  name: Get BOM by Part
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/bom/retrive_by_part/?part_id={{part_id}}"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: part_id
      value: "{{part_id}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
