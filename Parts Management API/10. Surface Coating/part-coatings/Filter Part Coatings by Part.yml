info:
  name: Filter Part Coatings by Part
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/parts/coating/part-coatings/?part={{part_id}}"
  params:
    - name: part
      value: "{{part_id}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  List part coatings filtered by part id.
  
  Current Bruno request:
  - Method: GET
  - URL: `{{base_url}}/parts/coating/part-coatings/`
  
  Methods accepted by this URL in the API:
  - GET, POST
  
  Notes:
  - Base API prefix is provided through `{{base_url}}`.
  - Some GET requests in this collection intentionally show body-based lookup by `id` because the current backend accepts merged query/body filters.
