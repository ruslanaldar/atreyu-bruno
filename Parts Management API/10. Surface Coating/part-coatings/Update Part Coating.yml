info:
  name: Update Part Coating
  type: http
  seq: 9

http:
  method: PUT
  url: "{{base_url}}/parts/coating/part-coatings/"
  body:
    type: json
    data: |-
      {
        "id": {{part_coating_id}},
        "part": {{part_id}},
        "submethod": {{submethod_id}},
        "corrosion_class": "C4",
        "thickness_specified_um": "0.40",
        "notes": "Final updated notes"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Replace a part coating using body id on the collection URL.
  
  Current Bruno request:
  - Method: PUT
  - URL: `{{base_url}}/parts/coating/part-coatings/`
  
  Methods accepted by this URL in the API:
  - GET, POST, PUT, PATCH
  
  Notes:
  - Base API prefix is provided through `{{base_url}}`.
  - This request uses `id` in the JSON body because the list endpoint now accepts update operations.
