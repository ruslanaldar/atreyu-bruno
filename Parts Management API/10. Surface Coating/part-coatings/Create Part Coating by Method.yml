info:
  name: Create Part Coating by Method
  type: http
  seq: 6

http:
  method: POST
  url: "{{base_url}}/parts/coating/part-coatings/"
  body:
    type: json
    data: |-
      {
        "part": {{part_id}},
        "method": {{method_id}},
        "corrosion_class": "C3",
        "notes": "Test coating assignment via method"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Create a part coating using a method leaf.

  Current Bruno request:
  - Method: POST
  - URL: `{{base_url}}/parts/coating/part-coatings/`

  Fields to fill:
  - subpart (id) subpart_id
  - method (id) method_id
  - submethod (id) submethod_id
  - ral_color (id) ral_color_id
  - anodizing_color (id) anodizing_color_id
  - corrosion_class (c2, c3, c4, c5)
  - gloss_gu (add gloss level 0-100)
  - notes (text)


  Methods accepted by this URL in the API:
  - GET, POST

  Notes:
  - Base API prefix is provided through `{{base_url}}`.
  - Some GET requests in this collection intentionally show body-based lookup by `id` because the current backend accepts merged query/body filters.
