info:
  name: Patch Coating SubMethod
  type: http
  seq: 8

http:
  method: PATCH
  url: "{{base_url}}/parts/coating/coating-submethods/"
  body:
    type: json
    data: |-
      {
        "id": {{submethod_id}},
        "corrosion_c2": true,
        "corrosion_c3": true
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Partially update a coating submethod using body id on the collection URL.
  
  Current Bruno request:
  - Method: PATCH
  - URL: `{{base_url}}/parts/coating/coating-submethods/`
  
  Methods accepted by this URL in the API:
  - GET, POST, PUT, PATCH
  
  Notes:
  - Base API prefix is provided through `{{base_url}}`.
  - This request uses `id` in the JSON body because the list endpoint now accepts update operations.
