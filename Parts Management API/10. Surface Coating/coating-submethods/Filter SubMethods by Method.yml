info:
  name: Filter SubMethods by Method
  type: http
  seq: 3

http:
  method: GET
  url: "{{base_url}}/parts/coating/coating-submethods/?method={{method_id}}"
  params:
    - name: method
      value: "{{method_id}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  List coating submethods filtered by method id.
  
  Current Bruno request:
  - Method: GET
  - URL: `{{base_url}}/parts/coating/coating-submethods/`
  
  Methods accepted by this URL in the API:
  - GET, POST
  
  Notes:
  - Base API prefix is provided through `{{base_url}}`.
  - Some GET requests in this collection intentionally show body-based lookup by `id` because the current backend accepts merged query/body filters.
