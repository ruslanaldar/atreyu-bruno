info:
  name: Create Anodizing Color
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/parts/coating/anodizing-colors/"
  body:
    type: json
    data: |-
      {
        "name": "Matte Grey",
        "description": "Industrial matte grey anodizing finish",
        "hex_color": "#707070",
        "order": 99
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Create a new anodizing color.
  
  Current Bruno request:
  - Method: POST
  - URL: `{{base_url}}/parts/coating/anodizing-colors/`
  
  Methods accepted by this URL in the API:
  - GET, POST
  
  Notes:
  - Base API prefix is provided through `{{base_url}}`.
  - Some GET requests in this collection intentionally show body-based lookup by `id` because the current backend accepts merged query/body filters.
