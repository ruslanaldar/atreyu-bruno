info:
  name: Patch Anodizing Color
  type: http
  seq: 6

http:
  method: PATCH
  url: "{{base_url}}/parts/coating/anodizing-colors/"
  body:
    type: json
    data: |-
      {
        "id": {{anodizing_color_id}},
        "hex_color": "#808080"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Partially update an anodizing color using body id on the collection URL.
  
  Current Bruno request:
  - Method: PATCH
  - URL: `{{base_url}}/parts/coating/anodizing-colors/`
  
  Methods accepted by this URL in the API:
  - GET, POST, PUT, PATCH
  
  Notes:
  - Base API prefix is provided through `{{base_url}}`.
  - This request uses `id` in the JSON body because the list endpoint now accepts update operations.
