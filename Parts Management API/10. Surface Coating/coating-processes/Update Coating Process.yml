info:
  name: Update Coating Process
  type: http
  seq: 7

http:
  method: PUT
  url: "{{base_url}}/parts/coating/coating-processes/"
  body:
    type: json
    data: |-
      {
        "id": {{process_id}},
        "name": "TEST PROCESS",
        "order": 50
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Replace a coating process using body id on the collection URL.
  
  Current Bruno request:
  - Method: PUT
  - URL: `{{base_url}}/parts/coating/coating-processes/`
  
  Methods accepted by this URL in the API:
  - GET, POST, PUT, PATCH
  
  Notes:
  - Base API prefix is provided through `{{base_url}}`.
  - This request uses `id` in the JSON body because the list endpoint now accepts update operations.
