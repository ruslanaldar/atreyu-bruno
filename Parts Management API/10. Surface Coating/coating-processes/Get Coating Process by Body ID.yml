info:
  name: Get Coating Process by Body ID
  type: http
  seq: 4

http:
  method: GET
  url: "{{base_url}}/parts/coating/coating-processes/"
  body:
    type: json
    data: |-
      {
        "id": {{process_id}}
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Get one coating process by sending id in the request body to the collection URL.
  
  Current Bruno request:
  - Method: GET
  - URL: `{{base_url}}/parts/coating/coating-processes/`
  
  Methods accepted by this URL in the API:
  - GET, POST
  
  Notes:
  - Base API prefix is provided through `{{base_url}}`.
  - Some GET requests in this collection intentionally show body-based lookup by `id` because the current backend accepts merged query/body filters.
