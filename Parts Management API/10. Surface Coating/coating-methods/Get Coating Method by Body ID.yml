info:
  name: Get Coating Method by Body ID
  type: http
  seq: 5

http:
  method: GET
  url: "{{base_url}}/parts/coating/coating-methods/"
  body:
    type: json
    data: |-
      {
        "id": {{method_id}}
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Get one coating method by sending id in the request body to the collection URL.

  Current Bruno request:
  - Method: GET
  - URL: `{{base_url}}/parts/coating/coating-methods/`

  Methods accepted by this URL in the API:
  - GET, POST

  Notes:
  - Base API prefix is provided through `{{base_url}}`.
  - Some GET requests in this collection intentionally show body-based lookup by `id` because the current backend accepts merged query/body filters.
