info:
  name: Filter Coating Methods by Process
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/parts/coating/coating-methods/?process={{process_id}}"
  params:
    - name: process
      value: "{{process_id}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  List coating methods filtered by process id.
  
  Current Bruno request:
  - Method: GET
  - URL: `{{base_url}}/parts/coating/coating-methods/`
  
  Methods accepted by this URL in the API:
  - GET, POST
  
  Notes:
  - Base API prefix is provided through `{{base_url}}`.
  - Some GET requests in this collection intentionally show body-based lookup by `id` because the current backend accepts merged query/body filters.
