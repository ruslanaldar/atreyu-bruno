info:
  name: Get SubPart Coating by Body ID
  type: http
  seq: 4

http:
  method: GET
  url: "{{base_url}}/parts/coating/subpart-coatings/"
  body:
    type: json
    data: |-
      {
        "id": {{subpart_coating_id}}
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Get one subpart coating by sending id in the JSON body to the collection URL.
  
  Current Bruno request:
  - Method: GET
  - URL: `{{base_url}}/parts/coating/subpart-coatings/`
  
  Methods accepted by this URL in the API:
  - GET, POST, PUT, PATCH, DELETE
  
  Notes:
  - Base API prefix is provided through `{{base_url}}`.
  - This request uses merged query/body filters supported by the current backend.
