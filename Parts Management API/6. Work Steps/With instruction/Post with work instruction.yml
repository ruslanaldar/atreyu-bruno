  body:
    type: multipart-form
    data:
      - name: subpart_id
        type: text
        value: "1535"
      - name: center_id
        type: text
        value: 14c178f5-0e0c-4409-8ade-ae32802036c8
      - name: station_id
        type: text
        value: 187d75d3-1145-43d7-b852-e2b8e92ab74e
