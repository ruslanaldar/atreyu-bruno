        type: text
        value: laser cutting for the part
      - name: work_description
        type: text
        value: percise cut for the laser
      - name: work_instruction_file
        type: file
        value:
          - postman-cloud:///1f0a8496-d2ed-44b0-bf6c-cbd19b8fe5de
