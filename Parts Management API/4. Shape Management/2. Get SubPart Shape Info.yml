info:
  name: 2. Get SubPart Shape Info
  type: http
  seq: 9

http:
  method: GET
  url: "{{base_url}}/sub-parts/{{subpart_id}}/shape_info/"
  headers:
    - name: Accept
      value: application/json
    - name: Authorization
      value: Bearer {{auth_token}}
      disabled: true
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Status code is 200", function () {
            expect(res.getStatus()).to.equal(200);
        });

        test("Response has subpart info", function () {
            var jsonData = res.getBody();
            expect(jsonData).to.have.property('subpart_id');
            expect(jsonData).to.have.property('subpart_name');
            expect(jsonData).to.have.property('attached_shape');
        });

        test("Shape is attached", function () {
            var jsonData = res.getBody();
            if (jsonData.attached_shape) {
                expect(jsonData.attached_shape).to.have.property('id');
                expect(jsonData.attached_shape).to.have.property('name');
                expect(jsonData.attached_shape.name).to.eql("Debug Test - Console Output");
            }
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 2. Get SubPart Shape Info Query
    request:
      url: "{{base_url}}/sub-parts/shape_info_query/?subpart_id={{subpart_id}}"
      method: GET
      headers:
        - name: Accept
          value: application/json
        - name: Authorization
          value: Bearer {{auth_token}}
          disabled: true
      params:
        - name: subpart_id
          value: "{{subpart_id}}"
          type: query
    response:
      body:
        type: text
        data: ""
  - name: 2. Get SubPart Shape Info DATA
    request:
      url: "{{base_url}}/sub-parts/shape_info_query/"
      method: GET
      headers:
        - name: Accept
          value: application/json
        - name: Authorization
          value: Bearer {{auth_token}}
          disabled: true
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
              "subpart_id": {{supart_id}}
          }
    response:
      body:
        type: text
        data: ""
