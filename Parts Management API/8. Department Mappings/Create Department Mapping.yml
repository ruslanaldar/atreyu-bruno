info:
  name: Create Department Mapping
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/department-file-mappings/create_mapping/"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "part_id": {{part_id}},
          "file_id": 1,
          "department_id": 1,
          "menu_id": 1,
          "submenu_id": 1
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
