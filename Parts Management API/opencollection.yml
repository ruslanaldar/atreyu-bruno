    - name: shape_id
      value: "13"
  scripts:
    - type: before-request
      code: |-
        // Auto-set common headers
        if (!req.getHeaders().has('Accept')) {
            req.getHeaders().add({
                key: 'Accept',
                value: 'application/json'
            });
        }

        // Add authentication if token exists
        const authToken = bru.getEnvVar('auth_token');
        if (authToken && !req.getHeaders().has('Authorization')) {
            req.getHeaders().add({
                key: 'Authorization',
                value: 'Bearer ' + authToken
            });
        }
    - type: after-response
      code: |-
        // Basic response validation
        test('Status code is successful', function () {
            expect(res.getStatus()).to.be.oneOf([200, 201, 204]);
        });

        test('Response time is reasonable', function () {
            expect(res.getResponseTime()).to.be.below(5000);
        });

        // Extract IDs from successful responses
        if (res.getStatus() === 200 || res.getStatus() === 201) {
            try {
                const responseJson = res.getBody();
                
                // Extract various IDs for chaining requests
                if (responseJson.id) {
                    const url = req.getUrl().toString();
                    if (url.includes('/parts/')) {
                        bru.setEnvVar('part_id', responseJson.id);
                    } else if (url.includes('/companies/')) {
                        bru.setEnvVar('company_id', responseJson.id);
                    }
                }
                
                // Handle nested data structures
                if (responseJson.data && responseJson.data.id) {
                    const url = req.getUrl().toString();
                    if (url.includes('/sub-parts/')) {
                        bru.setEnvVar('subpart_id', responseJson.data.id);
                    }
                }
            } catch (e) {
                console.log('Could not parse JSON response');
            }
        }

docs:
  content: Complete API collection for Parts Management System with hierarchical SubParts, BOM, WorkSteps, Files, and Shape management
  type: text/markdown
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
