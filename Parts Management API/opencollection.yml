    - name: auth_token
      value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ0b2tlbl90eXBlIjoiYWNjZXNzIiwiZXhwIjoxNzU2ODAzNzQ2LCJpYXQiOjE3NTY3MTczNDYsImp0aSI6ImMxZmE0MjM1MDM0ODRiM2Q4OTk2YjgzMjE5MTM4OTE4IiwidXNlcl9pZCI6MX0.27mEZPfYXsWFNPqmUoCjBWpEo_AsGP9bA9pxtwTQpH0
    - name: existing_shape_id
