info:
  name: Get All SubParts
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/sub-parts/?main_part_id={{part_id}}"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: main_part_id
      value: "{{part_id}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
