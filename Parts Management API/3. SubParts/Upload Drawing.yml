info:
  name: Upload Drawing
  type: http
  seq: 10

http:
  method: POST
  url: "{{base_url}}/sub-parts/upload_drawing/?subpart_id={{subpart_id}}"
  params:
    - name: subpart_id
      value: "{{subpart_id}}"
      type: query
  body:
    type: multipart-form
    data:
      - name: drawing
        type: file
        value:
          - postman-cloud:///1f06affc-37eb-40b0-895c-2bef7ae0d506
      - name: image
        type: text
        value: ""
        disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
