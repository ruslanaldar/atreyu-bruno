info:
  name: "Example 1.1: Create Serial Inquiry with Parts"
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/inquiries/"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "company": 61,
        "inquiry_type": "serial",
        "description": "Serial production: 200 part1, 400 part2, 350 part3"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
