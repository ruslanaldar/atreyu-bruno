info:
  name: Update Part Quantity
  type: http
  seq: 2

http:
  method: PUT
  url: "{{base_url}}/inquiries/?inquiry_id={{inquiry_id}}&action=update_part_quantity"
  headers:
    - name: Content-Type
      value: application/json
  params:
    - name: inquiry_id
      value: "{{inquiry_id}}"
      type: query
    - name: action
      value: update_part_quantity
      type: query
  body:
    type: json
    data: |-
      {
        "part_id": {{part_id}},
        "total_quantity": 150
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
