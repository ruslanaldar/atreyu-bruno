info:
  name: Get Specific Inquiry
  type: http
  seq: 3

http:
  method: GET
  url: "{{base_url}}/inquiries/?inquiry_id={{inquiry_id}}"
  params:
    - name: inquiry_id
      value: "{{inquiry_id}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
