info:
  name: Add Delivery Schedule
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/inquiries/?inquiry_id={{inquiry_id}}&action=add_delivery_schedule"
  headers:
    - name: Content-Type
      value: application/json
  params:
    - name: inquiry_id
      value: "{{inquiry_id}}"
      type: query
    - name: action
      value: add_delivery_schedule
      type: query
  body:
    type: json
    data: |-
      {
        "delivery_date": "2025-08-15",
        "delivery_address": "Warehouse A, 123 Main St",
        "notes": "First delivery batch",
        "delivery_parts": [
          {
            "part_id": 8,
            "quantity": 75
          },
          {
            "part_id": 7,
            "quantity": 30
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
