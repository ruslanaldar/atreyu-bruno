info:
  name: List Work Centers by_group
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/{{api_prefix}}/work-centers/?group_id={{group_id}}"
  headers:
    - name: Content-Type
      value: application/json
  params:
    - name: group_id
      value: "{{group_id}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
