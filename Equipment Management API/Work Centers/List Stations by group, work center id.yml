info:
  name: List Stations by group, work center id
  type: http
  seq: 3

http:
  method: GET
  url: "{{base_url}}/{{api_prefix}}/work-centers/?group_id={{group_id}}&workcenter_id={{workcenter_id}}&page=1"
  headers:
    - name: Content-Type
      value: application/json
  params:
    - name: group_id
      value: "{{group_id}}"
      type: query
    - name: workcenter_id
      value: "{{workcenter_id}}"
      type: query
    - name: page
      value: "1"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
