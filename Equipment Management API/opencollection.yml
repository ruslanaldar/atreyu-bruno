opencollection: 1.0.0

info:
  name: Equipment Management API

request:
  variables:
    - name: base_url
      value: http://27.223.82.66:18080
    - name: api_prefix
      value: api/basics/equipments
    - name: created_group_id
      value: b1c74b33-4579-4b19-9c6a-3bbac6c19c2c
    - name: group_id
      value: 9ee966d0-a71a-4418-8a4a-b4640fd90c4e
    - name: workcenter_id
      value: 14c178f5-0e0c-4409-8ade-ae32802036c8
    - name: section_id
      value: 6592ea2a-52ea-421e-817f-5d46cd6137e7
  scripts:
    - type: before-request
      code: |-
        // Set default headers for all requests
        req.getHeaders().add({
            key: 'Accept',
            value: 'application/json'
        });
    - type: after-response
      code: |-
        // Basic response validation
        test('Status code is successful', function () {
            expect(res.getStatus()).to.be.oneOf([200, 201, 204]);
        });

        // Store IDs for subsequent requests
        if (res.getStatus() === 201 && res.getBody()) {
            const responseJson = res.getBody();
            if (responseJson.id) {
                bru.setEnvVar('equipment_id', responseJson.id);
            }
        }

docs:
  content: Complete API collection for Equipment, WorkSection, WorkCenter, WorkStation, and WorkTable management
  type: text/markdown
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
