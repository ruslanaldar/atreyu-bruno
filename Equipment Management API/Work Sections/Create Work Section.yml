info:
  name: Create Work Section
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/{{api_prefix}}/work-sections/"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "Assembly Section",
        "name_cn": "装配区",
        "location": "FQA",
        "description": "Main assembly work section",
        "status": "active"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
