info:
  name: List by section
  type: http
  seq: 3

http:
  method: GET
  url: "{{base_url}}/{{api_prefix}}/work-stations/?section_id={{section_id}}"
  headers:
    - name: Content-Type
      value: application/json
  params:
    - name: status
      value: ""
      type: query
      description: Filter by status (active/inactive)
      disabled: true
    - name: section_id
      value: "{{section_id}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
