info:
  name: List Work Stations
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/{{api_prefix}}/work-stations?ordering=name&search="
  headers:
    - name: Content-Type
      value: application/json
  params:
    - name: ordering
      value: name
      type: query
      description: "Order by: section, workcenter, wc_code_string, name, code_string"
    - name: search
      value: ""
      type: query
      description: Search in name, section__name, workcenter__name, code_string
    - name: section
      value: ""
      type: query
      description: Filter by section ID
      disabled: true
    - name: status
      value: ""
      type: query
      description: Filter by status (active/inactive)
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
