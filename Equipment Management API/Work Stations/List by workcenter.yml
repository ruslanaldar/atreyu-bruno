info:
  name: List by workcenter
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/{{api_prefix}}/work-stations/?workcenter_id={{workcenter_id}}"
  headers:
    - name: Content-Type
      value: application/json
  params:
    - name: section
      value: ""
      type: query
      description: Filter by section ID
      disabled: true
    - name: status
      value: ""
      type: query
      description: Filter by status (active/inactive)
      disabled: true
    - name: workcenter_id
      value: "{{workcenter_id}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
