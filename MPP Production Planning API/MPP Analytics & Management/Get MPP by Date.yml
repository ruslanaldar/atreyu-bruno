info:
  name: Get MPP by Date
  type: http
  seq: 10

http:
  method: GET
  url: "{{base_url}}/productionplans/mpp/by_date/?date={{planning_date}}"
  params:
    - name: date
      value: "{{planning_date}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get MPP record for a specific date
