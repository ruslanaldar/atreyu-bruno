info:
  name: Get Latest MPP for Date
  type: http
  seq: 8

http:
  method: GET
  url: "{{base_url}}/productionplans/mpp/latest/?date={{planning_date}}"
  params:
    - name: date
      value: "{{planning_date}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get the latest MPP for a specific date
