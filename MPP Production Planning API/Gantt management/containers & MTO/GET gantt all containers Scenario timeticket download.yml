info:
  name: GET gantt all containers Scenario timeticket download
  type: http
  seq: 10

http:
  method: GET
  url: "{{base_url}}/productionplans/gantt/containers_overview/?scenario_id=recommended-8&is_tickets=true&ticket_date=2026-03-25"
  params:
    - name: scenario_id
      value: recommended-8
      type: query
    - name: is_tickets
      value: "true"
      type: query
    - name: ticket_date
      value: 2026-03-25
      type: query
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        var responseBody = res.getBody();
        bru.runner.file.save(responseBody, "time_tickets.pdf");

        Accept: application/pdf
        {{base_url}}/productionplans/gantt/containers_overview/?scenario_id=recommended-8&is_tickets=true&ticket_date=2026-03-20

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
