info:
  name: 3. Check version history
  type: http
  seq: 3

http:
  method: GET
  url: "{{base_url}}/productionplans/mpp/history/?date={{planning_date}}"
  params:
    - name: date
      value: "{{planning_date}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "Step 3: Check version history"
