http:
  method: GET
  url: "{{base_url}}/productionplans/capacity/?date={{planning_date}}"
  params:
    - name: date
      value: "{{planning_date}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

