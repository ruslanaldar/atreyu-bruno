info:
  name: Get Daily MPP Data with Specific MPP ID
  type: http
  seq: 9

http:
  method: GET
  url: "{{base_url}}/productionplans/mpp/daily/?mpp_id={{mpp_id}}&date={{planning_date}}"
  params:
    - name: mpp_id
      value: "{{mpp_id}}"
      type: query
    - name: date
      value: "{{planning_date}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get daily MPP data for specific date from specific MPP version
