info:
  name: Get MPP by Container with Specific MPP ID
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/productionplans/mpp/by_container/?container_no={{container_no}}&mpp_id={{mpp_id}}"
  params:
    - name: container_no
      value: "{{container_no}}"
      type: query
    - name: mpp_id
      value: "{{mpp_id}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get MPP data for specific container from specific MPP version
