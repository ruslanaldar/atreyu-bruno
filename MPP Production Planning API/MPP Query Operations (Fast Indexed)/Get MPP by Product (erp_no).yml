info:
  name: Get MPP by Product (erp_no)
  type: http
  seq: 6

http:
  method: GET
  url: "{{base_url}}/productionplans/mpp/by_product/?erp_no={{erp_no}}"
  params:
    - name: erp_no
      value: "{{erp_no}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get MPP data for specific product by erp_no
