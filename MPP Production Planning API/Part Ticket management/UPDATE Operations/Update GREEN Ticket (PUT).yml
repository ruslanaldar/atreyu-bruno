      {
          "container_no": "wk-0002",
          "pp_no": "60001929",
          "erp_no": "59506976",
          "station": "s01",
          "sub_station": "s0101",
          "completed_qty": "7.00",
          "status": "green",
          "emp_id": "211",
          "emp_name": "Wang Yanzhong",
          "unit_processing_time": "0.50",
          "created_by": "quality_inspector_01",
          "mo_no": "I-0709-0009",
          "drawing_no": "30026801.00",
          "man_seq": 1,
          "notes": "Updated GREEN ticket - quantity increased from 5 to 7 pieces",
