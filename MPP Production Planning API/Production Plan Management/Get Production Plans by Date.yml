info:
  name: Get Production Plans by Date
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/productionplans/production-plan/?date={{planning_date}}"
  params:
    - name: date
      value: "{{planning_date}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get production plans for a specific date from latest MPP
