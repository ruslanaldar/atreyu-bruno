info:
  name: Get Production Plan by Container and Date
  type: http
  seq: 3

http:
  method: GET
  url: "{{base_url}}/productionplans/production-plan/?container_no={{container_no}}&date={{planning_date}}"
  params:
    - name: container_no
      value: "{{container_no}}"
      type: query
    - name: date
      value: "{{planning_date}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get production plan for specific container and date
