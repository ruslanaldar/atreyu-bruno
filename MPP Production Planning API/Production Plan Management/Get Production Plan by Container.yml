info:
  name: Get Production Plan by Container
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/productionplans/production-plan/?container_no={{container_no}}"
  params:
    - name: container_no
      value: "{{container_no}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get production plan for specific container from latest MPP
