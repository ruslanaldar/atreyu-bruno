info:
  name: Check status
  type: http
  seq: 8

http:
  method: GET
  url: "{{base_url}}/productionplans/mpp/task_status/?task_id={{task_id}}"
  headers:
    - name: Content-Type
      value: application/json
  params:
    - name: task_id
      value: "{{task_id}}"
      type: query
  body:
    type: json
    data: |
      {
          "planning_date": "{{planning_date}}",
          "trigger_reason": "manual_creation",
          "status": "draft"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Create new MPP - automatically runs production planning to generate production_plan and remaining_capacity
