http:
  method: POST
  url: "{{base_url}}/productionplans/mpp/{{mpp_id}}/force_refresh/"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "trigger_reason": "force_refresh"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

