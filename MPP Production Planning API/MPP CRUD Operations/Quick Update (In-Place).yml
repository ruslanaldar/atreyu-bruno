info:
  name: Quick Update (In-Place)
  type: http
  seq: 13

http:
  method: PATCH
  url: "{{base_url}}/productionplans/mpp/{{mpp_id}}/quick_update/"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "status": "completed",
          "notes": "Quick status update"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Guaranteed in-place update for status/metadata changes
