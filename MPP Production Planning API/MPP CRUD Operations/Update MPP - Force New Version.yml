info:
  name: Update MPP - Force New Version
  type: http
  seq: 11

http:
  method: PUT
  url: "{{base_url}}/productionplans/mpp/{{mpp_id}}/?force_new_version=true"
  headers:
    - name: Content-Type
      value: application/json
  params:
    - name: force_new_version
      value: "true"
      type: query
  body:
    type: json
    data: |-
      {
          "trigger_reason": "forced_update",
          "notes": "Forced new version creation"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Force creation of new MPP version regardless of changes
