info:
  name: New Create New MPP shift_time
  type: http
  seq: 7

http:
  method: POST
  url: "{{base_url}}/productionplans/mpp/"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |
      {
          "async": true,
          "trigger_reason": "manual_creation",
          "status": "produce",
          "shift_time": 12,
          "is_saturday": true,
          "week_no": 4
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        var data = res.getBody();
        if (data.task_id) {
            bru.setEnvVar("task_id", data.task_id);
        }
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: ""
        method: jsonq
      variable:
        name: task_id
        scope: runtime

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Create new MPP - automatically runs production planning to generate production_plan and remaining_capacity
