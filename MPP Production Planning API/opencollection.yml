opencollection: 1.0.0

info:
  name: MPP Production Planning API
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  auth:
    type: bearer
    token: "{{access_token}}"
  variables:
    - name: base_url
      value: http://27.223.82.66:18080/api
    - name: access_token
      value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ0b2tlbl90eXBlIjoiYWNjZXNzIiwiZXhwIjoxNzczMjM4MTMzLCJpYXQiOjE3NzMxNTE3MzMsImp0aSI6IjA5OTcyNGQ1NjZmYjQwMTViMzMyMTQ1YmY4YzVmYWU2IiwidXNlcl9pZCI6MX0.qfUzXeJoKC_xkEqpRQTpXbdq2qr84--CQo2aVYfsoKc
    - name: mpp_id
      value: MPP20250821
    - name: container_no
      value: wk-0002
    - name: planning_date
      value: 2025-08-24
    - name: mo_no
      value: I-0709-0009
    - name: pp_no
      value: "60001929"
    - name: erp_no
      value: "59506980"
    - name: task_id
      value: ""
  scripts:
    - type: before-request
      code: |-
        // Auto-set date to today if not already set
        if (!bru.getVar('planning_date')) {
            const today = new Date().toISOString().split('T')[0];
            bru.setVar('planning_date', today);
        }

        // Auto-generate MPP ID based on date
        const planningDate = bru.getVar('planning_date');
        if (planningDate) {
            const dateStr = planningDate.replace(/-/g, '');
            const mppId = `MPP${dateStr}`;
            bru.setVar('mpp_id', mppId);
        }
    - type: after-response
      code: |-
        // Global test script for common assertions
        test('Response time is less than 5000ms', function () {
            expect(res.getResponseTime()).to.be.below(5000);
        });

        // Log response for debugging
        if (res.getStatus() >= 400) {
            console.log('Error Response:', JSON.stringify(res.getBody()));
        }

        // Extract and set MPP ID from response if available
        if (res.getStatus() === 201 || res.getStatus() === 200) {
            try {
                const jsonData = res.getBody();
                if (jsonData.mpp_id) {
                    bru.setVar('mpp_id', jsonData.mpp_id);
                    console.log('Set mpp_id:', jsonData.mpp_id);
                }
                if (jsonData.data && jsonData.data.mpp_id) {
                    bru.setVar('mpp_id', jsonData.data.mpp_id);
                    console.log('Set mpp_id from data:', jsonData.data.mpp_id);
                }
            } catch (e) {
                // Ignore JSON parsing errors
            }
        }

docs:
  content: Complete API collection for Master Production Plan (MPP) management system. Includes CRUD operations, analytics, capacity management, and production planning features.
  type: text/markdown
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
