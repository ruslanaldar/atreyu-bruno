info:
  name: Get Capacity Summary for Date Range
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/productionplans/analytics/capacity-summary/"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "start_date": "{{planning_date}}",
          "end_date": "2025-08-25"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get capacity summary for a date range
