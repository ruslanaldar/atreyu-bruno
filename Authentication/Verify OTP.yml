info:
  name: Verify OTP
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/organization/categories/otp/verify-otp/"
  body:
    type: multipart-form
    data:
      - name: email
        type: text
        value: ruslan.aldar@gmail.com
      - name: porpose
        type: text
        value: login
      - name: otp
        type: text
        value: "123456"

runtime:
  scripts:
    - type: after-response
      code: |-
        var data = res.getBody();
        if (data.access) {
            bru.setEnvVar("token", data.access);
        }
        if (data.refresh) {
            bru.setEnvVar("refresh_token", data.refresh);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
